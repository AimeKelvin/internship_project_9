<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600">
  <defs>
    <style>
      .bg { fill: #f8fafc }
      .card { fill: #ffffff; stroke: #e6e9ee; stroke-width: 1; rx: 8; }
      .title { font: 700 28px/1.2 'Inter', Arial, sans-serif; fill: #0f172a }
      .label { font: 600 14px/1.2 'Inter', Arial, sans-serif; fill: #334155 }
      .input { fill: #f1f5f9; stroke: #e2e8f0; stroke-width: 1; rx:6 }
      .button { fill: #0369a1; rx:6 }
      .btn-text { font: 600 16px/1 'Inter', Arial, sans-serif; fill: #ffffff }
    </style>
  </defs>
  <rect class="bg" width="100%" height="100%"/>
  <g transform="translate(120,80)">
    <rect class="card" width="760" height="440"/>
    <text class="title" x="40" y="60">Platr — Sign in</text>
    <text class="label" x="40" y="110">Email</text>
    <rect class="input" x="40" y="120" width="420" height="44"/>
    <text class="label" x="40" y="190">Password</text>
    <rect class="input" x="40" y="200" width="420" height="44"/>
    <g transform="translate(40,270)">
      <rect class="button" width="160" height="44"/>
      <text class="btn-text" x="28" y="29">Sign in</text>
    </g>
    <rect x="500" y="120" width="200" height="220" rx="8" fill="#eef2ff" stroke="#c7ddff"/>
    <text x="520" y="160" font-family="Inter, Arial" font-weight="600" font-size="14" fill="#0f172a">Quick access</text>
    <text x="520" y="190" font-family="Inter, Arial" font-size="13" fill="#475569">Admin / Kitchen / Waiter</text>
  </g>
</svg>
